workflows:
  flutter-ios:
    name: Flutter iOS Debug
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: cd eco_scan_park && flutter pub get
      - name: Build iOS debug
        script: cd eco_scan_park && flutter build ios --debug --no-codesign
    artifacts:
      - eco_scan_park/build/ios/iphonesimulator/**/*.app